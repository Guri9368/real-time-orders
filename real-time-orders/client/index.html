<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Orders</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- top bar -->
<div class="topbar">
    <h1>📦 <span>Real-Time</span> Orders</h1>
    <div id="conn-status" class="conn-status connecting">🟡 Connecting...</div>
</div>

<!-- main layout -->
<div class="page">

    <!-- left col — stats + orders table -->
    <div class="left-col">

        <!-- stat cards -->
        <div class="stats">
            <div class="stat-box">
                <div class="num" id="stat-total">0</div>
                <div class="label">Total</div>
            </div>
            <div class="stat-box">
                <div class="num yellow" id="stat-pending">0</div>
                <div class="label">Pending</div>
            </div>
            <div class="stat-box">
                <div class="num blue" id="stat-shipped">0</div>
                <div class="label">Shipped</div>
            </div>
            <div class="stat-box">
                <div class="num green" id="stat-delivered">0</div>
                <div class="label">Delivered</div>
            </div>
        </div>

        <!-- orders table -->
        <div class="card">
            <div class="card-header">
                <h2>Orders</h2>
                <span id="last-updated" style="font-size:12px;color:#475569"></span>
            </div>
            <div style="overflow-x:auto">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Status</th>
                            <th>Updated</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                        <tr>
                            <td colspan="6" class="table-empty">loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div><!-- /left-col -->

    <!-- right col — form + feed -->
    <div class="right-col">

        <!-- create order form -->
        <div class="card">
            <div class="card-header">
                <h2>➕ New Order</h2>
            </div>
            <div class="form-body">
                <div class="form-group">
                    <label for="cname">Customer Name</label>
                    <input type="text" id="cname" placeholder="e.g. Jane Smith" />
                </div>
                <div class="form-group">
                    <label for="pname">Product Name</label>
                    <input type="text" id="pname" placeholder="e.g. Wireless Keyboard" />
                </div>
                <div class="form-group">
                    <label for="ostatus">Status</label>
                    <select id="ostatus">
                        <option value="pending">Pending</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                    </select>
                </div>
                <button class="submit-btn" id="create-btn" onclick="createOrder()">
                    Create Order
                </button>
            </div>
        </div>

        <!-- live activity feed -->
        <div class="card" style="flex:1">
            <div class="card-header">
                <h2>⚡ Live Feed</h2>
                <button class="clear-btn" onclick="clearFeed()">clear</button>
            </div>
            <div id="feed" class="feed">
                <div class="feed-empty">waiting for changes...</div>
            </div>
        </div>

    </div><!-- /right-col -->

</div><!-- /page -->

<script src="app.js"></script>
</body>
</html>
